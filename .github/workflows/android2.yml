name: Android CI (Compilazione Automatica)

# Il processo si attiva ogni volta che fai un "push" o una "pull request" sul ramo principale (main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice del tuo progetto nella macchina virtuale
    - name: Checkout del codice
      uses: actions/checkout@v4

    # 2. Configura la versione di Java necessaria (Android Studio usa Java 17 di default per i progetti recenti)
    - name: Configura Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Ottimizza i tempi di build successivi

    # 3. Concede i permessi di esecuzione allo script Gradle (fondamentale su Linux)
    - name: Concedi permessi di esecuzione a Gradlew
      run: chmod +x gradlew

    # 4. Esegue la compilazione vera e propria (genera l'APK di Debug)
    - name: Compila l'APK con Gradle
      run: ./gradlew assembleDebug

    # 5. Salva l'APK generato in modo da poterlo scaricare da GitHub
    - name: Salva l'APK come Artefatto
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
